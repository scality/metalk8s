default_language_version:
  python: python3.6

repos:
  - repo: https://github.com/psf/black
    rev: 20.8b1
    hooks:
      - id: black
        name: Formatting Python

  - repo: https://github.com/pycqa/pylint
    rev: pylint-2.6.0
    hooks:
      - id: pylint
        name: Lint Python (non-salt)
        # Linting for non-salt files (also exclude tests files)
        additional_dependencies: ['pyenchant~=2.0', 'doit~=0.32.0']
        exclude: >
          (?x)^(
              salt/_.*|
              salt/tests/.*|
              tests/.*
          )$
      - id: pylint
        name: Lint Salt
        # Linting for salt files only in directory "salt/_<module>/<module_name>.py"
        files: salt/_.*/.*\.py
        additional_dependencies: ['saltpylint==2020.9.28']
        args:
          - --rcfile=salt/.pylintrc
          - --ignore=metalk8s_package_manager_apt.py

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v0.740
    hooks:
      - id: mypy
        name: Python typing
        # Only check typing for typed files
        files: >
          (?x)^(
              buildchain/dodo.py|
              buildchain/buildchain/.*|
              packages/debian/common/download_packages.py
          )$
        args:
          - --strict
